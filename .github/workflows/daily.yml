name: DreamHaus Daily Marketing Automation

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  automate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore topic history
        run: |
          mkdir -p data site/_posts site/_layouts
          if [ -n "${{ secrets.USED_TOPICS }}" ]; then
            echo "${{ secrets.USED_TOPICS }}" | base64 -d > data/used_topics.json || true
          fi

      - name: Inject API keys
        run: |
          sed -i "s/YOUR_GROQ_API_KEY_HERE/${{ secrets.GROQ_API_KEY }}/g"              config.py
          sed -i "s/YOUR_GEMINI_API_KEY_HERE/${{ secrets.GEMINI_API_KEY }}/g"          config.py
          sed -i "s/YOUR_CLAUDE_API_KEY_HERE/${{ secrets.CLAUDE_API_KEY }}/g"          config.py
          sed -i "s/YOUR_TELEGRAM_BOT_TOKEN_HERE/${{ secrets.TELEGRAM_BOT_TOKEN }}/g"  config.py

      - name: Run automation
        run: python main.py

      - name: Publish blog to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./site
          publish_branch: gh-pages
          force_orphan: true
